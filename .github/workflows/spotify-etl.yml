name: Spotify ETL Pipeline

on:
  schedule:
    # Runs every 2 hours, offset by 17 minutes to avoid GitHub's top-of-hour traffic jams
    - cron: '17 */2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Spotify Cache File
        env:
          SPOTIFY_CACHE: ${{ secrets.SPOTIFY_CACHE }}
        run: |
          python -c 'import os; open(".cache", "w").write(os.environ["SPOTIFY_CACHE"])'

      - name: Run ETL Pipeline
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          MELODATA_API_KEY: ${{ secrets.MELODATA_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python run_pipeline.py
